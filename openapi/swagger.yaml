openapi: 3.0.0
info:
  title: SMS Dashboard API
  description: API for managing SMS modems, messages, and users.
  version: 1.0.0
servers:
  - url: /api/v1
    description: V1 API

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or ivy API key
      description: Use `Bearer <jwt>` for dashboard sessions or `Bearer ivy_...` for API key access.

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        allowed_modems:
          type: string
          description: Comma separated ICCIDs or "*"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Modem:
      type: object
      properties:
        iccid:
          type: string
        name:
          type: string
        imei:
          type: string
        sip_enabled:
          type: boolean
        sip_username:
          type: string
        sip_proxy:
          type: string
        sip_port:
          type: integer
        sip_domain:
          type: string
        sip_transport:
          type: string
          enum: [udp, tcp, tls]
        sip_register:
          type: boolean
        sip_tls_skip_verify:
          type: boolean
        sip_accept_incoming:
          type: boolean
        sip_invite_target:
          type: string
        sip_listen_port:
          type: integer
        sip_has_password:
          type: boolean
        operator:
          type: string
        signal_strength:
          type: integer
        port_name:
          type: string
        status:
          type: string
          enum: [online, offline]
        registration:
          type: string
        last_seen:
          type: string
          format: date-time
        worker_exists:
          type: boolean
        call_supported:
          type: boolean
        sip_available:
          type: boolean
        sip_listener_active:
          type: boolean
        sip_listener_transport:
          type: string
        sip_line_id:
          type: string
        sip_register_state:
          type: string
        sip_register_reason:
          type: string
        sip_register_updated_at:
          type: string
          format: date-time

    SMS:
      type: object
      properties:
        id:
          type: integer
        iccid:
          type: string
        phone:
          type: string
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          enum: [sent, received]
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: integer
        iccid:
          type: string
        url:
          type: string
        platform:
          type: string
          enum: [telegram, slack, generic]
        channel_id:
          type: string
          description: "For Telegram"
        template:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time

    APIKeyRecord:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        key_prefix:
          type: string
        can_make_call:
          type: boolean
        can_view_sms:
          type: boolean
        can_send_sms:
          type: boolean
        can_send_at:
          type: boolean
        is_active:
          type: boolean
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    APIKeyCreateRequest:
      type: object
      properties:
        name:
          type: string
        can_make_call:
          type: boolean
        can_view_sms:
          type: boolean
        can_send_sms:
          type: boolean
        can_send_at:
          type: boolean
        expires_at:
          type: string
          format: date-time

    APIKeyCreateResponse:
      type: object
      properties:
        api_key:
          type: string
        record:
          $ref: "#/components/schemas/APIKeyRecord"

security:
  - bearerAuth: []

paths:
  /login:
    post:
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials

  /change_password:
    post:
      summary: Change Password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
      responses:
        "200":
          description: Password updated

  /modems:
    get:
      summary: List all modems
      responses:
        "200":
          description: List of modems
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Modem"

  /modems/{iccid}:
    get:
      summary: Get modem detailed info
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Modem details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Modem"
    put:
      summary: Update modem details and SIP client settings
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                sip_enabled:
                  type: boolean
                sip_username:
                  type: string
                sip_password:
                  type: string
                  description: Leave blank to keep the current password
                sip_proxy:
                  type: string
                sip_port:
                  type: integer
                sip_domain:
                  type: string
                sip_transport:
                  type: string
                  enum: [udp, tcp, tls]
                sip_register:
                  type: boolean
                sip_tls_skip_verify:
                  type: boolean
                sip_accept_incoming:
                  type: boolean
                sip_invite_target:
                  type: string
                sip_listen_port:
                  type: integer
      responses:
        "200":
          description: Updated modem
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Modem"
    delete:
      summary: Delete modem profile by ICCID (Admin only)
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Modem deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: deleted
                  iccid:
                    type: string

  /modems/{iccid}/scan:
    post:
      summary: Scan for available networks
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of available networks
          content:
            application/json:
              schema:
                type: object
                properties:
                  networks:
                    type: array
                    items:
                      type: string

  /modems/{iccid}/operator:
    post:
      summary: Set network operator
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                operator:
                  type: string
                  description: "MCCMNC code or 'AUTO'"
      responses:
        "200":
          description: Operator set initiated

  /modems/{iccid}/at:
    post:
      summary: Execute AT command directly
      tags: [Modems]
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cmd:
                  type: string
                  example: "AT+CSQ"
                timeout:
                  type: integer
                  example: 5000
      responses:
        200:
          description: Command response
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string

  /modems/{iccid}/input:
    post:
      summary: Send raw input (e.g. for SMS prompt)
      tags: [Modems]
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cmd:
                  type: string
                  example: "Message Body\x1A"
                timeout:
                  type: integer
                  example: 5000
      responses:
        200:
          description: Input response
          content:
            application/json:
              schema:
                type: object
                properties:
                  response:
                    type: string

  /modems/{iccid}/call/state:
    get:
      summary: Get call state
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current call state
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                  reason:
                    type: string
                  updated_at:
                    type: string
                    format: date-time
                  uac_ready:
                    type: boolean
                  uac_vid:
                    type: string
                  uac_pid:
                    type: string
                  call_mode:
                    type: string
                    enum: [modem, sip]
                  sip_available:
                    type: boolean
                  sip_listener_transport:
                    type: string
                  sip_listen_port:
                    type: integer
                  sip_state:
                    type: object
                    properties:
                      state:
                        type: string
                      reason:
                        type: string
                      updated_at:
                        type: string
                        format: date-time
                      active:
                        type: boolean
                      register_state:
                        type: string
                      register_reason:
                        type: string
                      register_updated_at:
                        type: string
                        format: date-time

  /modems/{iccid}/call/dial:
    post:
      summary: Dial a number
      description: "Browser frontend uses WebRTC signaling plus modem/UAC audio and sends only `number`. Optional `via: sip` is reserved for backend/API integrations that intentionally route over the modem's SIP external line."
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [number]
              properties:
                number:
                  type: string
                via:
                  type: string
                  enum: [modem, sip]
                  default: modem
                  description: Optional integration override. Browser UI always uses modem/WebRTC. Use `sip` only for backend/API control of the modem's SIP external line.
      responses:
        "200":
          description: Dial command accepted

  /modems/{iccid}/call/hangup:
    post:
      summary: Hangup current call
      description: Browser UI omits `via` and lets the server auto-select the active call leg. `via` remains available for explicit backend/API integrations.
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                via:
                  type: string
                  enum: [modem, sip]
                  description: Optional integration override. If omitted, server auto-selects the active call leg.
      responses:
        "200":
          description: Hangup command accepted

  /modems/{iccid}/call/dtmf:
    post:
      summary: Send in-call DTMF tone
      description: Browser UI omits `via` and lets the server auto-select the active call leg. `via` remains available for explicit backend/API integrations.
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tone]
              properties:
                tone:
                  type: string
                  description: one of 0-9,*,#
                  example: "5"
                via:
                  type: string
                  enum: [modem, sip]
                  description: Optional integration override. If omitted, server auto-selects the active call leg.
      responses:
        "200":
          description: DTMF sent

  /modems/{iccid}/ws:
    get:
      summary: WebRTC signaling websocket endpoint
      description: Upgrade to WebSocket and exchange SDP/ICE signaling messages.
      parameters:
        - name: iccid
          in: path
          required: true
          schema:
            type: string
      responses:
        "101":
          description: Switching Protocols

  /sms:
    get:
      summary: List SMS messages
      parameters:
        - name: iccid
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of SMS
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SMS"
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer

  /apikeys:
    get:
      summary: List my API keys
      responses:
        "200":
          description: List of API keys owned by the authenticated user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APIKeyRecord"
    post:
      summary: Create API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APIKeyCreateRequest"
      responses:
        "200":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreateResponse"

  /apikeys/{id}/rotate:
    post:
      summary: Rotate API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: API key rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyCreateResponse"

  /apikeys/{id}:
    delete:
      summary: Delete API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: API key deleted

  /mcp:
    servers:
      - url: /
    get:
      summary: Open MCP Streamable HTTP SSE stream
      description: "Open the optional SSE stream for the MCP Streamable HTTP session. Use `Authorization: Bearer ivy_...` and the `Mcp-Session-Id` header from initialize."
      responses:
        "200":
          description: SSE stream opened
        "401":
          description: Invalid or missing API key
    post:
      summary: MCP Streamable HTTP JSON-RPC endpoint
      description: "Send MCP JSON-RPC messages to ivy over Streamable HTTP. Initialize with `POST /mcp`, then continue using the returned `Mcp-Session-Id` header. Available tools are `list_modems`, `list_sms`, `wait_sms`, and `send_sms`."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: JSON-RPC request or batch request body
      responses:
        "200":
          description: JSON-RPC response or SSE stream response depending on MCP negotiation
        "401":
          description: Invalid or missing API key
    delete:
      summary: Close MCP Streamable HTTP session
      description: "Close the MCP session identified by `Mcp-Session-Id`."
      responses:
        "200":
          description: Session closed
        "401":
          description: Invalid or missing API key

  /users:
    get:
      summary: List users (Admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      summary: Create new user (Admin only)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, user]
                allowed_modems:
                  type: string
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    delete:
      summary: Delete user (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deleted

  /webhooks:
    get:
      summary: List webhooks (Admin only)
      parameters:
        - name: iccid
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"
    post:
      summary: Create webhook (Admin only)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                iccid:
                  type: string
                platform:
                  type: string
                url:
                  type: string
                template:
                  type: string
      responses:
        "200":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"

  /webhooks/{id}:
    delete:
      summary: Delete webhook (Admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Webhook deleted

